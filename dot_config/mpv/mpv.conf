# ─── Video Output ───
vo = gpu-next
gpu-api = opengl
profile = gpu-hq

# ─── Audio ───
ao = pulse

# ─── Upscaling ───
scale = ewa_lanczossharp
dscale = mitchell
cscale = ewa_lanczossharp
deband = yes
deband-iterations = 2
deband-threshold = 35
deband-range = 16

# ─── Subtitle ───
sub-font = "JetBrainsMono Nerd Font"
sub-font-size = 36
sub-color = "#FFFFFF"
sub-border-color = "#000000"
sub-border-size = 2
sub-shadow-offset = 0
sub-blur = 0
sub-ass-override = force
sub-auto = fuzzy
sub-scale-with-window = no

# ─── Screenshot ───
screenshot-format = png
screenshot-template = "mpv-screenshot-%f-%p"
screenshot-directory = "~/Scaricati"
screenshot-tag-colorspace = yes

# ─── Cache ───
cache = yes
cache-secs = 60
demuxer-max-bytes = 500M
demuxer-max-back-bytes = 100M

# ─── Window ───
border = no
keep-open = yes
keepaspect = yes
autofit-larger = 2560x1440
geometry = 50%
